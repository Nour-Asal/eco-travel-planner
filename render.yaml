services:
  - type: web
    name: eco-travel-planner
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
